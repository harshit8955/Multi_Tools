<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Toolbox</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🧰</div>
      <div>
        <h1>Toolbox</h1>
        <span>Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Main</div>
        <div class="nav-item active" data-page="dashboard">
          <span class="ni-icon">📊</span> Dashboard
        </div>
        <div class="nav-item" data-page="tools">
          <span class="ni-icon">🧰</span> Manage Tools
          <span class="nav-badge" id="enabledBadge">20</span>
        </div>
        <div class="nav-item" data-page="settings">
          <span class="ni-icon">⚙️</span> Settings
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Categories</div>
        <div class="nav-item" onclick="showAdminPage('tools');categoryFilter='Image';renderPage()">
          <span class="ni-icon">🖼️</span> Image Tools
        </div>
        <div class="nav-item" onclick="showAdminPage('tools');categoryFilter='Generator';renderPage()">
          <span class="ni-icon">⬛</span> Generators
        </div>
        <div class="nav-item" onclick="showAdminPage('tools');categoryFilter='Developer';renderPage()">
          <span class="ni-icon">💻</span> Developer
        </div>
        <div class="nav-item" onclick="showAdminPage('tools');categoryFilter='Design';renderPage()">
          <span class="ni-icon">🎨</span> Design
        </div>
        <div class="nav-item" onclick="showAdminPage('tools');categoryFilter='Text';renderPage()">
          <span class="ni-icon">📝</span> Text Tools
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Quick Actions</div>
        <div class="nav-item" onclick="enableAll()">
          <span class="ni-icon">✅</span> Enable All Tools
        </div>
        <div class="nav-item" onclick="disableAll()">
          <span class="ni-icon">⏸️</span> Disable All Tools
        </div>
        <div class="nav-item" onclick="exportConfig()">
          <span class="ni-icon">📤</span> Export Config
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html">
        <span>🌐</span> View Live Site
      </a>
      <a href="#" onclick="if(confirm('Log out?'))window.location='index.html'">
        <span>🚪</span> Log Out
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="admin-main">

    <!-- TOPBAR -->
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="theme-toggle" id="menuToggle" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle">🌙</button>
        <a href="index.html" class="btn btn-primary btn-sm">🌐 View Site</a>
        <div class="topbar-avatar" title="Admin">A</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="admin-content" id="adminContent">
      <!-- Rendered by JS -->
    </div>

  </main>

  <!-- Toast -->
  <div class="toast-container"></div>

  <script src="js/admin.js"></script>
  <script>
    // Update badge
    function updateBadge() {
      const en = Object.values(getEnabled()).filter(Boolean).length;
      const b = document.getElementById('enabledBadge');
      if(b) b.textContent = en;
    }
    const origSave = saveEnabled;
    window.saveEnabled = function(s) { origSave(s); updateBadge(); };

    // Mobile menu
    if(window.innerWidth < 900) {
      document.getElementById('menuToggle').style.display = 'flex';
    }
  </script>
</body>
</html>
